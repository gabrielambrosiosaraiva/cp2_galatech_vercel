<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gala Tech 2026</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>🎉 Gala Tech 2026</h1>
            <p>O maior evento de inovação, IA, Oracle e Python do ano.</p>
            <p>Últimas vagas abertas para VIP e Platinum.</p>
        </section>

        <section class="metrics">
            <div class="card"><h2>200</h2><p>Vagas Totais</p></div>
            <div class="card"><h2>4</h2><p>Últimas Vagas</p></div>
            <div class="card"><h2>15+</h2><p>Palestrantes</p></div>
            <div class="card"><h2>3</h2><p>Áreas VIP</p></div>
        </section>

        <section class="form-box">
            <h2>🚀 Garanta sua vaga</h2>

            {% if mensagem %}
                <div class="success">{{ mensagem }}</div>
            {% endif %}

            <form action="/inscrever" method="POST">
                <input type="text" name="nome" placeholder="Nome completo" required>
                <input type="email" name="email" placeholder="E-mail" required>

                <select name="tipo">
                    <option>Ingresso Normal - R$300</option>
                    <option>Ingresso VIP - R$800</option>
                    <option>Ingresso Platinum - R$1200</option>
                </select>

                <select name="prioridade">
                    <option>NORMAL</option>
                    <option>VIP</option>
                    <option>PLATINUM</option>
                </select>

                <button type="submit">Finalizar inscrição</button>
            </form>
        </section>
    </div>
</body>
</html>
